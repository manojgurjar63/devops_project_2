<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Forgot Password · Society Shops</title>
<link rel="stylesheet" th:href="@{/css/dashboard.css}">
<style>
.auth-center { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0a1560,#1a237e,#3949ab); }
.auth-box { background:white; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 12px 40px rgba(0,0,0,0.2); }
.auth-box h2 { font-size:22px; font-weight:800; color:#1a237e; margin-bottom:6px; text-align:center; }
.auth-box p  { font-size:14px; color:#888; text-align:center; margin-bottom:24px; }
</style></head>
<body>
<div class="auth-center">
    <div class="auth-box">
        <div style="text-align:center;font-size:36px;margin-bottom:10px;">🔑</div>
        <h2>Forgot Password</h2>
        <p>Enter your email and we'll send you a reset link.</p>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form th:action="@{/web/forgot-password}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Send Reset Link</button>
        </form>
        <p style="text-align:center;margin-top:18px;font-size:14px;">
            <a th:href="@{/web/login}" style="color:#1a237e;font-weight:600;">← Back to Login</a>
        </p>
    </div>
</div>
</body></html>
