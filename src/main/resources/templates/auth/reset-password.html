<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reset Password · Society Shops</title>
<link rel="stylesheet" th:href="@{/css/dashboard.css}">
<style>
.auth-center { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0a1560,#1a237e,#3949ab); }
.auth-box { background:white; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 12px 40px rgba(0,0,0,0.2); }
.auth-box h2 { font-size:22px; font-weight:800; color:#1a237e; margin-bottom:6px; text-align:center; }
.auth-box p  { font-size:14px; color:#888; text-align:center; margin-bottom:24px; }
</style></head>
<body>
<div class="auth-center">
    <div class="auth-box">
        <div style="text-align:center;font-size:36px;margin-bottom:10px;">🔒</div>
        <h2>Reset Password</h2>
        <p>Enter your new password below.</p>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <form th:action="@{/web/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}" />
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Enter new password" required minlength="6" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Reset Password</button>
        </form>
    </div>
</div>
</body></html>
